# EAS production build (and optional submit) for the mobile app.
#
# Required secret: EXPO_TOKEN — same token as eas-preview.yml. Configure it on
# the "production" GitHub environment (Settings -> Environments -> production)
# so it can require manual approval before this workflow is allowed to run.
name: EAS Production
on:
  workflow_dispatch:
    inputs:
      submit:
        description: "Also submit the build to the app stores after it finishes"
        type: boolean
        default: false
jobs:
  production:
    runs-on: ubuntu-latest
    environment: production
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build production (requires EXPO_TOKEN secret)
        if: env.EXPO_TOKEN != ''
        working-directory: apps/mobile
        run: eas build --profile production --non-interactive
      - name: Submit to app stores (optional)
        if: env.EXPO_TOKEN != '' && inputs.submit
        working-directory: apps/mobile
        run: eas submit --profile production --non-interactive
